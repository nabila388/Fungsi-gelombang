<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Wave Function Simulator</title>

  <!-- Tailwind & Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; margin: 0; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    canvas { image-rendering: auto; }
    .tab-active { background: #0f172a; color: #38bdf8; border-bottom: 2px solid #38bdf8; }
    .tab-inactive { background: transparent; color: #94a3b8; border-bottom: 2px solid transparent; }
    .tab-inactive:hover { color: #cbd5e8; }
    .theory-card { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border: 1px solid #334155; border-radius: 12px; }
    .glow { box-shadow: 0 0 20px rgba(56,189,248,0.15); }
    .scroll-wrap { overflow-y: auto; overflow-x: hidden; }
  </style>
</head>

<body class="h-full bg-[#020617] text-gray-200">

<div id="app" class="h-full w-full flex flex-col scroll-wrap">

<!-- HEADER -->
<header class="px-4 py-4 border-b border-slate-800">
  <h1 class="text-xl font-bold text-white">Simulasi Fungsi Gelombang Kuantum</h1>
</header>

<!-- TABS -->
<nav class="flex border-b border-slate-800 px-4 gap-1">
  <button onclick="switchTab('sim')" id="tabSim" class="tab-active px-4 py-2 text-sm">Simulasi</button>
  <button onclick="switchTab('theory')" id="tabTheory" class="tab-inactive px-4 py-2 text-sm">Teori</button>
</nav>

<!-- SIM -->
<div id="panelSim" class="flex-1 flex flex-col gap-4 p-4">

  <!-- SLIDERS -->
  <div class="space-y-3">
    <input type="range" id="nSlider" min="1" max="8" value="1" oninput="updateSim()">
    <input type="range" id="eSlider" min="0.5" max="10" value="1" step="0.25" oninput="updateSim()">
    <input type="range" id="lSlider" min="0.5" max="3" value="1" step="0.1" oninput="updateSim()">
    <input type="range" id="tSlider" min="0" max="6.28" value="0" step="0.05" oninput="updateSim()">
  </div>

  <!-- CANVAS -->
  <canvas id="canvasPsi" style="width:100%;height:250px;"></canvas>
  <canvas id="canvasProb" style="width:100%;height:250px;"></canvas>
  <canvas id="canvasV" style="width:100%;height:150px;"></canvas>

</div>

<!-- THEORY -->
<div id="panelTheory" class="hidden p-4">
  <p>Penjelasan teori mekanika kuantum...</p>
</div>

</div>

<script>
function switchTab(tab) {
  document.getElementById('panelSim').classList.toggle('hidden', tab !== 'sim');
  document.getElementById('panelTheory').classList.toggle('hidden', tab !== 'theory');
}

function computeWavefunction(x, n, t) {
  return {
    re: Math.sin(n * Math.PI * x) * Math.cos(t),
    im: Math.sin(n * Math.PI * x) * Math.sin(t)
  };
}

function updateSim() {
  const canvas = document.getElementById('canvasPsi');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;

  const n = parseInt(document.getElementById('nSlider').value);
  const t = parseFloat(document.getElementById('tSlider').value);

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();

  for(let i=0;i<canvas.width;i++){
    const x = i/canvas.width;
    const {re} = computeWavefunction(x,n,t);
    const y = canvas.height/2 - re*100;
    if(i===0) ctx.moveTo(i,y);
    else ctx.lineTo(i,y);
  }

  ctx.stroke();

  // probability
  const ctx2 = document.getElementById('canvasProb').getContext('2d');
  const c2 = document.getElementById('canvasProb');
  c2.width = c2.clientWidth;
  c2.height = c2.clientHeight;
  ctx2.clearRect(0,0,c2.width,c2.height);

  ctx2.beginPath();
  for(let i=0;i<c2.width;i++){
    const x=i/c2.width;
    const {re,im}=computeWavefunction(x,n,t);
    const prob=re*re+im*im;
    const y=c2.height - prob*200;
    if(i===0) ctx2.moveTo(i,y);
    else ctx2.lineTo(i,y);
  }
  ctx2.stroke();

  // potential dummy
  const ctx3 = document.getElementById('canvasV').getContext('2d');
  const c3 = document.getElementById('canvasV');
  c3.width = c3.clientWidth;
  c3.height = c3.clientHeight;
  ctx3.clearRect(0,0,c3.width,c3.height);

  ctx3.beginPath();
  for(let i=0;i<c3.width;i++){
    const x=i/c3.width;
    const v = (x<0.2||x>0.8)?1:0;
    const y=c3.height - v*100;
    if(i===0) ctx3.moveTo(i,y);
    else ctx3.lineTo(i,y);
  }
  ctx3.stroke();
}

updateSim();
lucide.createIcons();
</script>

</body>
</html>
